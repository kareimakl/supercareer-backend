openapi: 3.0.3
info:
  title: SuperCareer AI API
  version: 1.0.0
  description: Comprehensive API for SuperCareer platform, including job/project matching
    and administration.
paths:
  /api/accounts/dashboard-stats/:
    get:
      operationId: accounts_dashboard_stats_retrieve
      tags:
      - accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
          description: ''
  /api/admin-tools/activities/:
    get:
      operationId: admin_tools_activities_list
      tags:
      - admin-tools
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminActivity'
          description: ''
  /api/admin-tools/scraping-logs/:
    get:
      operationId: admin_tools_scraping_logs_list
